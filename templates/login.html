<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hepatitis AI Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

</head>

<body>
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div id="particles-js"></div>

<div class="container">

<div class="logo">🧬</div>

<h2>Hepatitis AI</h2>

<p class="subtitle">
AI powered blood report analysis
</p>

<div id="login-section">

<input type="text" id="loginName" placeholder="Enter Name">

<button onclick="login()">Login</button>

<p>or <a href="#" onclick="showNewUser()">Create New User</a></p>

</div>


<div id="newuser-section" style="display:none;">

<input type="text" id="newName" placeholder="Name">
<input type="text" id="newPhone" placeholder="Phone">
<input type="number" id="newAge" placeholder="Age">

<select id="newGender">
<option value="">Select Gender</option>
<option>Female</option>
<option>Male</option>
</select>

<label><input type="checkbox" id="newThyroid"> Thyroid</label>
<label><input type="checkbox" id="newPCOS"> PCOS</label>
<label><input type="checkbox" id="newPregnancy"> Pregnancy</label>

<button onclick="createUser()">Create User</button>

<p><a href="#" onclick="showLogin()">Back to Login</a></p>

</div>

</div>

<script src="{{ url_for('static', filename='login.js') }}"></script>

<script>
particlesJS("particles-js",{
"particles":{
"number":{"value":50},
"size":{"value":3},
"color":{"value":"#6b7280"},
"line_linked":{"enable":true,"color":"#9ca3af"},
"move":{"speed":1}
}
});
</script>

</body>
</html>
